      }[m]));
    }

    function normalizeStatus(v){
      return String(v || '表示').replace(/\s/g,'').trim();
    }

    function parseCSV(text){
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;

      for(let i=0;i<text.length;i++){
        const char = text[i];
        const next = text[i+1];

        if(char === '"' && inQuotes && next === '"'){
          cell += '"';
          i++;
        }else if(char === '"'){
          inQuotes = !inQuotes;
        }else if(char === ',' && !inQuotes){
          row.push(cell);
          cell = '';
        }else if((char === '\n' || char === '\r') && !inQuotes){
          if(cell || row.length){
            row.push(cell);
            rows.push(row);
            row = [];
            cell = '';
          }
          if(char === '\r' && next === '\n') i++;
        }else{
          cell += char;
        }
      }

      if(cell || row.length){
        row.push(cell);
        rows.push(row);
      }

      return rows;
    }

    async function fetchSheet(sheetName){
      const res = await fetch(sheetCsvUrl(sheetName), { cache:'no-store' });
      if(!res.ok) throw new Error(`${sheetName}を読み込めませんでした`);
      return await res.text();
    }

async function loadGoogleSheetEquipmentGroup(config){

    sheetLastText.equipment[config.key] = text;

    const parsed = parseCSV(text);

        .replace(/\s/g,'')

    const h0 = cleanHeader[0] || '';

    const h3 = cleanHeader[3] || '';
    const h4 = cleanHeader[4] || '';

      h0 === '商品名' &&

      h4 === '掲載' &&

    if(!isEquipmentSheet){

      state.edit.equipment[config.key] = [];
      render();

    const items = rows
      .map(r => ({
        name: (r[0] || '').trim(),
        spec: (r[1] || '').trim(),
        price: (r[2] || '').trim(),
        description: (r[3] || '').trim(),
        published: normalizeStatus(r[4]),
        contact: normalizeStatus(r[5])
      }))
      .filter(item => item.name && item.published !== '非表示')
      .map(item => [
        item.name,
        item.spec,
        item.price,
        item.description,

      ]);

    state.edit.equipment[config.key] = items;
    render();
  }catch(error){
    console.warn(`${config.sheet}の読み込みをスキップしました`, error);
    state.edit.equipment[config.key] = [];
    render();
  }

 function render(){
  const caseNo = state.path.startsWith('/gallery/') ? Number(state.path.split('/').pop()) : -1;
  const currentCase = state.edit.cases[caseNo];

  const equipmentMatch = state.path.startsWith('/equipment/')
    ? state.path.split('/')[2]
    : null;

  const currentEquipment = EQUIPMENT_SHEETS.find(x => x.key === equipmentMatch);

  let page = '';

  if(state.path === '/') page = Home();
  else if(state.path === '/sell') page = Sell();

  else if(currentEquipment) page = EquipmentCategoryPage(currentEquipment);
  else if(state.path === '/order') page = Order();
  else if(state.path === '/support') page = Support();
  else if(state.path === '/gallery') page = Gallery();
  else if(currentCase) page = CaseDetail(currentCase);
  else if(state.path === '/news') page = NewsPage();
  else if(state.path === '/access') page = AccessPage();
  else if(state.path === '/contact') page = Contact();

  else page = Shell('404','ページが見つかりません','指定されたURLは存在しません。','<button data-go="/">ホームへ戻る</button>');

  document.getElementById('app').innerHTML = `
    <div class="site ${state.view === 'sp' ? 'mobileView' : 'pcView'}">
      ${state.opening ? Opening() : ''}
      ${Header()}
      ${state.menu ? MobileMenu() : ''}
      ${page}
      ${Footer()}
    </div>
  `;

  bind();
}

    function bind(){
      document.querySelectorAll('[data-go]').forEach(e => e.onclick = () => go(e.dataset.go));

      document.querySelectorAll('[data-view]').forEach(e => e.onclick = () => {
        state.view = e.dataset.view;
        render();
      });

      const m = document.querySelector('[data-menu]');
      if(m) m.onclick = () => {
        state.menu = !state.menu;
        render();
      };

      const s = document.querySelector('[data-skip]');
      if(s) s.onclick = () => {
        state.opening = false;
        render();
      };

      const v = document.querySelector('.openingVideo');
      if(v){
        v.onended = v.onerror = () => {
          state.opening = false;
          render();
        };
      }

      const loginForm = document.querySelector('[data-login]');
      if(loginForm){
        loginForm.onsubmit = e => {
          e.preventDefault();
          const pass = document.querySelector('[data-admin-password]').value;

          if(pass === ADMIN_PASSWORD){
            sessionStorage.setItem('ak-admin-login','true');
            state.adminLoggedIn = true;
            render();
          }else{
            alert('パスワードが違います');
          }
        };
      }

      const logout = document.querySelector('[data-logout]');
      if(logout){
        logout.onclick = () => {
          sessionStorage.removeItem('ak-admin-login');
          state.adminLoggedIn = false;
          render();
        };
      }
    }
