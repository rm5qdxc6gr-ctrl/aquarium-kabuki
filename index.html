<body>
  <div id="app"></div>
  <script>
const routes = [
  ['ホーム','/'], ['生体販売','/sell'], ['飼育機材','/equipment'], ['オーダー水槽','/order'],
  ['アクアリウム実例集','/gallery'], ['お知らせ','/news'], ['アクセス','/access'], ['お問い合わせ','/contact']
];

const data = {
  fish: [
    ['辣椒紅龍','24cm前後','¥158,000','アロワナ'],
    ['過背金龍','23cm前後','¥168,000','金龍'],
    ['シルバーアロワナ','20cm前後','¥25,000','銀龍'],
    ['ディスカス レッド','12cm前後','¥9,800','ディスカス']
  ],
  news: [
    ['お知らせ','営業時間変更のお知らせ','営業時間・臨時休業はこちらでご案内します。'],
    ['ブログ','アロワナ飼育のポイント','水温・水質・餌・混泳の基本を紹介します。'],
    ['入荷情報','辣椒紅龍・大型魚 入荷','発色の良い個体が入荷しました。']
  ],
  cases: [
    ['辣椒紅龍 成長記録','小山市 K様','購入時24cm → 現在38cm','購入生体の成長記録','アロワナ'],
    ['大型アロワナ水槽 導入事例','結城市 O様','納品時 → 3ヶ月後 → 現在','オーダー水槽実績','大型魚水槽'],
    ['ディスカス レッド 飼育実例','筑西市 S様','購入時12cm → 現在15cm','購入生体の成長記録','ディスカス']
  ]
};

const state = {
  path: getPath(),
  menu: false,
  view: 'pc',
  opening: getPath() === '/',
  edit: loadEdit()
};

function loadEdit(){
  try { return JSON.parse(localStorage.getItem('aquarium-kabuki-edit')) || structuredClone(data); }
  catch { return structuredClone(data); }
}
function saveEdit(){ localStorage.setItem('aquarium-kabuki-edit', JSON.stringify(state.edit)); }
function getPath(){ return location.hash ? (location.hash.slice(1) || '/') : '/'; }
function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function go(p){ location.hash = p; state.path=p; state.menu=false; scrollTo(0,0); render(); }
window.addEventListener('hashchange',()=>{ state.path=getPath(); render(); });

function render(){
  const caseNo = state.path.startsWith('/gallery/') ? Number(state.path.split('/').pop()) : -1;
  const currentCase = state.edit.cases[caseNo];
  let page = '';
  if(state.path==='/') page = Home();
  else if(state.path==='/sell') page = Sell();
  else if(state.path==='/equipment') page = Equipment();
  else if(state.path==='/order') page = Order();
  else if(state.path==='/support') page = Support();
  else if(state.path==='/gallery') page = Gallery();
  else if(currentCase) page = CaseDetail(currentCase);
  else if(state.path==='/news') page = NewsPage();
  else if(state.path==='/access') page = AccessPage();
  else if(state.path==='/contact') page = Contact();
  else if(state.path==='/admin') page = Admin();
  else page = Shell('404','ページが見つかりません','指定されたURLは存在しません。','<button data-go="/">ホームへ戻る</button>');
  document.getElementById('app').innerHTML = `<div class="site ${state.view==='sp'?'mobileView':'pcView'}">${state.opening ? Opening() : ''}${Header()}${state.menu?MobileMenu():''}${page}${Footer()}</div>`;
  bind();
}
function bind(){
  document.querySelectorAll('[data-go]').forEach(e=>e.onclick=()=>go(e.dataset.go));
  document.querySelectorAll('[data-view]').forEach(e=>e.onclick=()=>{state.view=e.dataset.view;render();});
  const m=document.querySelector('[data-menu]'); if(m) m.onclick=()=>{state.menu=!state.menu;render();};
  const s=document.querySelector('[data-skip]'); if(s) s.onclick=()=>{state.opening=false;render();};
  const v=document.querySelector('.openingVideo'); if(v){v.onended=v.onerror=()=>{state.opening=false;render();};}
  document.querySelectorAll('[data-edit]').forEach(input=>input.oninput=()=>{const [sec,r,c]=input.dataset.edit.split(':');state.edit[sec][+r][+c]=input.value;saveEdit();});
  document.querySelectorAll('[data-add]').forEach(btn=>btn.onclick=()=>{const s=btn.dataset.add;if(s==='fish')state.edit.fish.push(['新規生体','サイズ未定','価格未定','分類']);if(s==='news')state.edit.news.push(['お知らせ','新しいお知らせ','本文を入力してください。']);if(s==='cases')state.edit.cases.push(['新しい実例','地域 イニシャル様','導入時 → 現在','実例カテゴリ','内容']);saveEdit();render();});
  document.querySelectorAll('[data-del]').forEach(btn=>btn.onclick=()=>{const [s,i]=btn.dataset.del.split(':');state.edit[s].splice(+i,1);saveEdit();render();});
  const reset=document.querySelector('[data-reset]'); if(reset) reset.onclick=()=>{if(confirm('初期データに戻しますか？')){state.edit=structuredClone(data);saveEdit();render();}};
}
function Header(){return `<header><button class="brand" data-go="/"><b>アクアリウムかぶき</b><small>茨城県結城市</small></button><nav>${routes.slice(0,-1).map(([l,p])=>`<button class="${state.path===p||(p==='/gallery'&&state.path.startsWith('/gallery/'))?'on':''}" data-go="${p}">${l}</button>`).join('')}</nav><div class="viewSwitch"><button class="${state.view==='pc'?'on':''}" data-view="pc">PC</button><button class="${state.view==='sp'?'on':''}" data-view="sp">スマホ</button></div><button class="cta" data-go="/contact">お問い合わせ</button><button class="hamb" data-menu>${state.menu?'×':'☰'}</button></header>`;}
function MobileMenu(){return `<div class="mobile">${routes.map(([l,p])=>`<button data-go="${p}">${l}</button>`).join('')}</div>`;}
function Opening(){return `<div class="openingLayer"><video class="openingVideo" src="videos/opening.mp4" autoplay muted playsinline></video><button class="skipOpening" data-skip>SKIP</button></div>`;}
function Shell(sub,title,lead,body){return `<main class="shell"><p class="sub">${sub}</p><h1>${title}</h1><p class="lead">${lead}</p>${body}<button class="top" onclick="scrollTo(0,0)">ページ上部へ</button></main>`;}
function Section(sub,title,body,white=false){return `<section class="section ${white?'white':''}"><p class="sub">${sub}</p><h2>${title}</h2>${body}</section>`;}
function Cards(items){return `<div class="grid">${items.map(([t,d,p])=>`<article class="card" ${p?`data-go="${p}"`:''}><span>${t}</span><p>${d}</p></article>`).join('')}</div>`;}
function FishCards(){return `<div class="grid four">${state.edit.fish.map(f=>`<article class="card" data-go="/sell"><em>${esc(f[3])}</em><h3>${esc(f[0])}</h3><p>${esc(f[1])} / 在庫確認可</p><b>${esc(f[2])}</b></article>`).join('')}</div>`;}
function NewsCards(){return `<div class="grid">${state.edit.news.map(n=>`<article class="card"><em>${esc(n[0])}</em><h3>${esc(n[1])}</h3><p>${esc(n[2])}</p></article>`).join('')}</div>`;}
function CaseCards(){return `<div class="grid">${state.edit.cases.map((c,i)=>`<article class="card" data-go="/gallery/${i}"><em>${esc(c[3])}</em><h3>${esc(c[0])}</h3><p>${esc(c[1])} / ${esc(c[2])}</p><b>詳細を見る →</b></article>`).join('')}</div>`;}
function Home(){return `<section class="hero"><div><p class="sub redText">YUKI IBARAKI</p><h1>アクアリウム<br>かぶき</h1><p>美しい観賞魚と理想の水景を、もっと身近に。生体販売から飼育機材、オーダー水槽、飼育実績のご紹介までサポートします。</p><button data-go="/sell">生体を見る</button><button class="ghost" data-go="/contact">お問い合わせ</button></div></section>${Section('SERVICE','取り扱いサービス',Cards([['生体販売','アロワナ・大型魚・熱帯魚をご案内します。','/sell'],['飼育機材','フィルター・照明・餌など幅広く対応。','/equipment'],['オーダー水槽','理想の水槽づくりをサポートします。','/order']]))}${Section('FEATURED','おすすめ生体',FishCards(),true)}${Section('OWNERS GALLERY','アクアリウム実例集',`<p class="lead">オーナー様・店舗での飼育実績、オーダー水槽の現在、生体の成長記録を掲載。</p>${CaseCards()}<button data-go="/gallery">実例集をもっと見る</button><p class="note">※掲載写真はお客様の許可をいただいた実例のみ掲載しています。写真・文章の無断転載を禁止します。</p>`)}${Section('NEWS','お知らせ・ブログ',NewsCards(),true)}${Section('ACCESS','店舗情報・アクセス',`${AccessBlock()}<button data-go="/access">アクセス詳細を見る</button>`)}${Section('CONTACT','お問い合わせ',`<p class="lead">在庫確認、飼育相談、オーダー水槽、機材取り寄せなどお気軽にお問い合わせください。</p><button data-go="/contact">お問い合わせフォームへ</button>`,true)}`;}
function Sell(){return Shell('LIVESTOCK','生体販売','アロワナ・大型魚・熱帯魚を中心に、状態・サイズ・発色・餌食いを確認してご案内します。',`<div class="list">${state.edit.fish.map(f=>`<article class="card"><em>${esc(f[3])}</em><h3>${esc(f[0])}</h3><p>${esc(f[1])} / 状態確認・取り置き相談可</p><p>発色・餌食い・混泳可否など、個体の状態を確認してご案内します。</p><b>${esc(f[2])}</b>${f[3]!=='ディスカス'?'<button data-go="/contact">この生体について問い合わせる</button>':''}</article>`).join('')}</div>`);}
function Equipment(){return Shell('EQUIPMENT','飼育機材','大型魚・熱帯魚の飼育に必要な機材を、水槽サイズや魚種に合わせて提案します。',Cards([['ろ過設備','上部・外部フィルター、濾材、ポンプ類'],['照明','水槽サイズや見せ方に合わせたLED'],['水質管理','カルキ抜き、バクテリア、pH管理'],['餌・添加剤','アロワナ・大型魚向けフード']]));}
function Order(){return Shell('CUSTOM TANK','オーダー水槽','設置場所・飼育魚・メンテナンス性に合わせて、水槽サイズ・ろ過・照明・台・配管までトータルでご相談いただけます。',`<div class="grid two"><article class="card"><em>STANDARD ORDER</em><h3>通常オーダー水槽</h3><p>サイズ・ろ過・照明・台・配管をヒアリングし、飼育魚や設置場所に合わせて製作します。</p></article><article class="card hot" data-go="/support"><em>SUPPORT</em><h3>設置・飼育サポート</h3><p>納品後の管理性や飼育スタイルまで考え、長く維持しやすい水槽づくりをサポートします。</p><b>詳しく見る →</b></article></div>${Flow('オーダー水槽の流れ',['相談','仕様決定','見積もり','製作','設置','サポート'])}<div class="mock">ORDER AQUARIUM</div><button data-go="/contact">オーダー水槽について問い合わせる</button>`);}
function Flow(title,items){return `<h3 class="flowTitle">${title}</h3><div class="flow">${items.map((x,i)=>`<div><span>0${i+1}</span>${x}</div>`).join('')}</div>`;}
function Gallery(){return Shell('OWNERS GALLERY','アクアリウム実例集','オーナー様・店舗での飼育実績、オーダー水槽の現在、購入された生体の成長記録を魚種・水槽ごとにまとめたページです。',`${Cards([['魚別：アロワナ','辣椒紅龍・過背金龍などの成長記録。'],['魚別：ディスカス','ディスカスの飼育実例。'],['水槽別：大型魚水槽','オーダー水槽の納品時・現在の姿。']])}${CaseCards()}<p class="note">※掲載写真はお客様の許可をいただいた実例のみ掲載しています。写真・文章の無断転載を禁止します。</p>`);}
function CaseDetail(c){return Shell('CASE STUDY',esc(c[0]),`${esc(c[1])}の実例です。導入時から現在までの変化や仕様・コメントを掲載します。`,`<article class="card"><em>${esc(c[3])}</em><p><b>お客様：</b>${esc(c[1])}</p><p><b>内容：</b>${esc(c[4])}</p><p><b>変化：</b>${esc(c[2])}</p><p><b>お客様コメント：</b>導入後も状態良く育っていて、相談できるので安心です。</p></article><div class="flow"><div>購入時 / 納品時</div><div>3ヶ月後</div><div>現在</div><div>ギャラリー</div></div><button data-go="/gallery">アクアリウム実例集に戻る</button><p class="note">※掲載写真はお客様の許可をいただいた実例のみ掲載しています。写真・文章の無断転載を禁止します。</p>`);}
function NewsPage(){return Shell('NEWS','お知らせ・ブログ','営業時間、入荷情報、飼育のポイントなどを掲載します。',NewsCards());}
function AccessPage(){return Shell('ACCESS','店舗情報・アクセス','茨城県結城市大字結城13724にあるアクアリウムショップです。ご来店前の在庫確認や飼育相談もお気軽にお問い合わせください。',AccessBlock());}function AccessBlock(){return `<div class="accessGrid smartAccess"><article class="accessPanel"><div class="accessHead"><em>SHOP INFORMATION</em><h3>アクアリウムかぶき</h3><p>茨城県結城市の観賞魚・アクアリウムショップです。熱帯魚、アロワナ、金魚、水草、水槽用品など、飼育に関するご相談もお気軽にお問い合わせください。</p></div><div class="infoList"><div><span>SHOP NAME</span><p>アクアリウムかぶき</p></div><div><span>ADDRESS</span><p>〒307-0001<br>茨城県結城市大字結城13724</p></div><div><span>TEL</span><p><a href="tel:0296325775">0296-32-5775</a><br>在庫確認・飼育相談もお気軽にお問い合わせください。</p></div><div><span>OPEN</span><p>月〜金　11:00〜20:00<br>土日　10:00〜20:00</p></div><div><span>CLOSED</span><p>木曜日</p></div></div><div class="accessActions"><a href="tel:0296325775">電話する</a><a href="https://www.google.com/maps/dir/?api=1&destination=%E8%8C%A8%E5%9F%8E%E7%9C%8C%E7%B5%90%E5%9F%8E%E5%B8%82%E5%A4%A7%E5%AD%97%E7%B5%90%E5%9F%8E13724" target="_blank" rel="noopener noreferrer">Googleマップで開く</a></div></article><div class="mapEmbed"><iframe title="アクアリウムかぶき Googleマップ" src="https://www.google.com/maps?q=%E8%8C%A8%E5%9F%8E%E7%9C%8C%E7%B5%90%E5%9F%8E%E5%B8%82%E5%A4%A7%E5%AD%97%E7%B5%90%E5%9F%8E13724&output=embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div></div>`;}function Contact(){return Shell('CONTACT','お問い合わせ','在庫確認、飼育相談、オーダー水槽、機材取り寄せなどお気軽にお問い合わせください。',`<form><label>名前<input placeholder="山田 太郎"></label><label>メール<input placeholder="example@email.com"></label><label>内容<textarea placeholder="お問い合わせ内容"></textarea></label><button type="button">送信する</button></form>`);}
function Support(){return Shell('DELIVERY / SETUP','設置・飼育サポート','水槽の配達・設置から、導入後の飼育環境づくりまでサポートします。',`<div class="grid two"><article class="card hot"><em>FREE DELIVERY</em><h3>30km圏内・1500mm〜1800mm水槽は無料対応</h3><p>店舗から30km圏内、1500mm〜1800mm水槽なら配達・設置無料で対応します。その他のサイズ・距離は応相談となります。</p></article><article class="card"><em>AFTER SUPPORT</em><h3>納品後の飼育サポート</h3><p>ろ過・水質・照明・餌・メンテナンス性まで、長く維持しやすい飼育環境づくりをサポートします。</p></article></div><p class="note">※その他のサイズ・距離は応相談です。設置環境、搬入経路、水槽サイズ、作業内容によっては別途費用が発生する場合があります。詳細は事前にお問い合わせください。</p><button data-go="/contact">設置サポートについて問い合わせる</button>`);}
function Admin(){return Shell('ADMIN','管理者ページ','公開後の更新を想定した管理者用ページです。このデモでは入力内容がこのブラウザ内に保存され、各ページに反映されます。本番ではログイン認証とデータベース保存に差し替えます。',`<p class="note">※現在はデモ用です。別の端末やブラウザには反映されません。本番公開時は管理者ログイン後だけ見えるCMS化が必要です。</p>${AdminTable('生体販売の更新','fish',state.edit.fish,['名称','サイズ','価格','分類'])}<button data-add="fish">生体を追加</button>${AdminTable('お知らせの更新','news',state.edit.news,['カテゴリ','タイトル','本文'])}<button data-add="news">お知らせを追加</button>${AdminTable('アクアリウム実例集の更新','cases',state.edit.cases,['タイトル','お客様','変化','種類','内容'])}<button data-add="cases">実例を追加</button><div class="adminActions"><button data-reset>初期データに戻す</button></div>`);}
function AdminTable(title,section,rows,labels){return `<div class="adminBlock"><h3>${title}</h3>${rows.map((row,i)=>`<article class="adminRow">${labels.map((label,j)=>`<label>${label}<input value="${esc(row[j]||'')}" data-edit="${section}:${i}:${j}"></label>`).join('')}<button data-del="${section}:${i}">削除</button></article>`).join('')}</div>`;}
function Footer(){return `<footer><b>アクアリウムかぶき</b><p>観賞魚・大型魚・飼育機材・オーダー水槽の専門店。</p><small>© 2026 Aquarium Kabuki All Rights Reserved.</small></footer>`;}
render();

  </script>
</body>
